<!DOCTYPE html>
<html>
<head>
  <title>Canvas Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- The triangle's own tip is the handle: closed, only that tip shows past the
       right edge; clicking it slides the whole picker out. -->
  <div id="colorPicker" role="group" aria-label="Colour picker">
    <div id="trianglePane">
      <canvas id="triangleCanvas" aria-label="Saturation and brightness"></canvas>
      <input id="hexInput" type="text" spellcheck="false" autocomplete="off" maxlength="7" aria-label="Hex colour">
    </div>
    <canvas id="hueCanvas" aria-label="Hue"></canvas>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
