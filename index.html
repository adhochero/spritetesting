<!DOCTYPE html>
<html>
<head>
  <title>Canvas Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Drawer: the tab stays on screen, the panel sits off-screen until opened. -->
  <div id="colorPicker">
    <button id="colorTab" type="button" aria-expanded="false" aria-controls="colorPanel" aria-label="Toggle colour picker">
      <span id="colorTabSwatch"></span>
    </button>

    <div id="colorPanel" role="group" aria-label="Colour picker">
      <div id="pickerControls">
        <canvas id="triangleCanvas" aria-label="Saturation and brightness"></canvas>
        <canvas id="hueCanvas" aria-label="Hue"></canvas>
      </div>

      <label id="pickerReadout">
        <span id="hexSwatch"></span>
        <input id="hexInput" type="text" spellcheck="false" autocomplete="off" maxlength="7" aria-label="Hex colour">
      </label>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
