<!DOCTYPE html>
<html>
<head>
  <title>Canvas Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="colorPicker">
    <!-- defaults are #ffb494 in HSB -->
    <label>
      <span>HUE</span>
      <input type="range" id="hueSlider" min="0" max="360" step="1" value="18">
    </label>
    <label>
      <span>SAT</span>
      <input type="range" id="satSlider" min="0" max="100" step="1" value="42">
    </label>
    <label>
      <span>BRI</span>
      <input type="range" id="briSlider" min="0" max="100" step="1" value="100">
    </label>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
